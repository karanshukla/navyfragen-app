# Configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# This repo uses npm workspaces with a single root-level bun.lock (the installer
# was swapped from npm to bun — see issue #250). Dependabot's dedicated `bun`
# ecosystem updates bun.lock natively; the `npm` ecosystem does NOT update
# bun.lock correctly for workspaces (dependabot-core #14223), so this MUST stay
# on `bun` and point at the workspace root ("/") so the full workspace graph is
# resolved against the shared root lockfile.

version: 2
updates:
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      atproto:
        patterns:
          - "@atproto/*"
      atcute:
        patterns:
          - "@atcute/*"
      mantine:
        patterns:
          - "@mantine/*"
      oxlint:
        patterns:
          - "oxlint"

  - package-ecosystem: "docker"
    directory: "/anubis"
    schedule:
      interval: "weekly"
