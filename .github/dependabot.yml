# Configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# This repo uses npm workspaces with a single root-level package-lock.json.
# Dependabot MUST point at the workspace root ("/") so it resolves the full
# workspace dependency graph and updates the shared root lockfile. Pointing it
# at "/server" or "/client" instead leaves the root lockfile out of sync and
# breaks `npm ci` in CI (see dependabot-core #6270).

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      atproto:
        patterns:
          - "@atproto/*"
      atcute:
        patterns:
          - "@atcute/*"
      mantine:
        patterns:
          - "@mantine/*"
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "@typescript-eslint/*"
          - "eslint-*"

  - package-ecosystem: "docker"
    directory: "/anubis"
    schedule:
      interval: "weekly"
