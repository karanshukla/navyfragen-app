name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  client-tests:
    name: Client Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: "client/package.json"

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Run client tests with coverage
        run: cd client && npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: client-coverage-report
          path: client/coverage/
          retention-days: 14

      - name: Report coverage on PR
        uses: davelosert/vitest-coverage-report-action@v2
        if: always() && github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: client

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2.3.6
        if: always()
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: client/coverage/lcov.info
          flag-name: client
          base-path: client
          parallel: true
          coverage-threshold-percent: 97

  server-tests:
    name: Server Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: "server/package.json"

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Run server tests with coverage
        id: server-tests
        run: cd server && npm run test:coverage 2>&1 | tee /tmp/server-test-output.txt
        continue-on-error: true

      - name: Report coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/server-test-output.txt', 'utf8');

            // c8 text reporter outputs a table starting with a "---|---" separator line
            const coverageIdx = output.search(/^-+\|/m);
            if (coverageIdx === -1) {
              console.log('No coverage data found in output');
              console.log('--- last 800 chars ---');
              console.log(output.slice(-800));
              return;
            }

            const coverageText = output.slice(coverageIdx).trim();

            const marker = '<!-- server-coverage-comment -->';
            const body = `${marker}\n### Server Test Coverage\n\n\`\`\`\n${coverageText}\n\`\`\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2.3.6
        if: always()
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: server/coverage/lcov.info
          flag-name: server
          base-path: server
          parallel: true
          coverage-threshold-percent: 97

      - name: Fail if tests failed
        if: steps.server-tests.outcome == 'failure'
        run: exit 1

  opengraph-tests:
    name: OpenGraph Service (Go) Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: opengraph-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: opengraph-service/go.mod
          cache: true
          cache-dependency-path: opengraph-service/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Run tests
        # -race exercises the singleflight / cache-mutex / semaphore
        # concurrency surface that this change introduces. CGO is required for
        # the race detector; setup-go enables it by default on linux.
        run: go test -race -count=1 ./...

  coveralls-finish:
    name: Coveralls Finish
    needs: [client-tests, server-tests]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Finalize Coveralls build
        uses: coverallsapp/github-action@v2.3.6
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true
          carryforward: "client,server"
          coverage-threshold-percent: 97
