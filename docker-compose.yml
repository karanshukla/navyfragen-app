services:

  # ── Entry points ────────────────────────────────────────────────────────────

  # Bot-protection WAF.  Main app entry point — http://localhost:8080
  anubis:
    build: ./anubis
    ports:
      - "8080:8080"
    environment:
      BIND: :8080
      TARGET: http://caddy:80
    depends_on:
      - caddy
    restart: unless-stopped

  # Short-URL redirector.  fragen.navy equivalent — http://localhost:8081
  # e.g. localhost:8081/handle  →  localhost:8080/profile/handle
  redirector:
    image: zappi/redirector
    ports:
      - "8081:8080"
    environment:
      REDIRECT_TARGET: "${PUBLIC_URL:-http://localhost:8080}/profile"
    restart: unless-stopped

  # ── Reverse proxy ───────────────────────────────────────────────────────────

  # Routes /*  →  client,  /api/*  →  server (strips /api prefix)
  caddy:
    build: ./caddy
    environment:
      PORT: 80
      FRONTEND_DOMAIN: client
      FRONTEND_PORT: 4173
      BACKEND_DOMAIN: server
      BACKEND_PORT: 3000
    depends_on:
      - client
      - server
    restart: unless-stopped

  # ── Application services ────────────────────────────────────────────────────

  # React SPA served by nginx
  client:
    build:
      context: ./client
      args:
        # /api is stripped by Caddy before forwarding to the server
        VITE_API_URL: /api
        # Short-URL domain shown in the inbox link card
        VITE_SHORTLINK_URL: "localhost:8081"
    restart: unless-stopped

  # Express API
  server:
    build: ./server
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      PUBLIC_URL: "${PUBLIC_URL:-http://localhost:8080}"
      CLIENT_URL: "${PUBLIC_URL:-http://localhost:8080}"
      EXPORT_HTML_URL: http://html-to-image:3033/
      OAUTH_TOKEN_SECRET: "${OAUTH_TOKEN_SECRET:?Set OAUTH_TOKEN_SECRET in .env (openssl rand -hex 32)}"
      COOKIE_SECRET: "${COOKIE_SECRET:?Set COOKIE_SECRET in .env (openssl rand -hex 32)}"
      POSTGRESQL_URL: "postgres://${POSTGRES_USER:-navyfragen}:${POSTGRES_PASSWORD:-navyfragen}@postgres:5432/${POSTGRES_DB:-navyfragen}"
    depends_on:
      postgres:
        condition: service_healthy
      html-to-image:
        condition: service_started
    restart: unless-stopped

  # Puppeteer image renderer
  html-to-image:
    build: ./html-to-image
    # Chromium needs a larger /dev/shm than Docker's default 64 MB
    shm_size: "256m"
    restart: unless-stopped

  # ── Data ────────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-navyfragen}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-navyfragen}"
      POSTGRES_DB: "${POSTGRES_DB:-navyfragen}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-navyfragen}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres-data:
