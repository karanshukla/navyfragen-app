# E2E test overlay — compose on top of docker-compose.yml:
#
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.e2e.yml up --build
#
# What this changes:
#   • Bakes VITE_E2E_TESTING=true into the client build (shows the app-password form)
#   • Enables the /auth/e2e-login route on the server
#   • Exposes Caddy directly on port 8090 so Playwright bypasses Anubis bot-protection
#
# Credentials (E2E_HANDLE, E2E_APP_PASSWORD) are NOT in this file.
# Pass them as env vars from your shell or a gitignored .env.e2e file:
#   export E2E_HANDLE=yourhandle.pds.karanshukla.ca
#   export E2E_APP_PASSWORD=xxxx-xxxx-xxxx-xxxx

services:
  client:
    build:
      args:
        VITE_E2E_TESTING: "true"

  server:
    environment:
      NODE_ENV: "test"
      E2E_TESTING: "true"
      E2E_PDS_URL: "${E2E_PDS_URL:-https://bsky.social}"

  caddy:
    ports:
      - "8090:80"
